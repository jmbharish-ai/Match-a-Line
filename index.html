<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Home</title>
        <script src="game.js"></script>
        <style>
            body{
                text-align: center;
            }
            button{
                width: 50px;
                height: 50px;
                border: 2px solid black;
                border-radius: 25px;
            }
            .completed{
                width: 70px;
                height: 70px;
                background-color: red;
                border-radius: 0px;
                display:flex;
                justify-content:center;
                align-items:center;
            }
        </style>
    </head>
    <body>
        <h1>Match a Line</h1>
        <h1>Choose a Stage</h1>
        <div style="
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 2px;
        align-items: center;
        ">
            <div class="completed" id="rgb(255, 0, 255)">
                <button style="background-color: rgb(255, 0, 255);" onclick="play('rgb(255, 0, 255)')"></button>
            </div>
            <div class="completed" id="rgb(0, 255, 255)">
                <button style="background-color: rgb(0, 255, 255);" onclick="play('rgb(0, 255, 255)')"></button>
            </div>
            <div class="completed" id="rgb(255, 255, 255)">
                <button style="background-color: rgb(255, 255, 255);" onclick="play('rgb(255, 255, 255)')"></button>
            </div>
            <div class="completed" id="rgb(255, 0, 0)">
                <button style="background-color: rgb(255, 0, 0);" onclick="play('rgb(255, 0, 0)')"></button>
            </div>
            <div class="completed" id="rgb(0, 0, 0)">
                <button style="background-color: rgb(0, 0, 0);" onclick="play('rgb(0, 0, 0)')"></button>
            </div>
            <div class="completed" id="rgb(0, 0, 255)">
                <button style="background-color: rgb(0, 0, 255);" onclick="play('rgb(0, 0, 255)')"></button>
            </div>
            <div class="completed" id="rgb(128, 64, 0)">
                <button style="background-color: rgb(128, 64, 0);" onclick="play('rgb(128, 64, 0)')"></button>
            </div>
            <div class="completed" id="rgb(128, 128, 128)">
                <button style="background-color: rgb(128, 128, 128);" onclick="play('rgb(128, 128, 128)')"></button>
            </div>
            <div class="completed" id="rgb(255, 128, 0)">
                <button style="background-color: rgb(255, 128, 0);" onclick="play('rgb(255, 128, 0)')"></button>
            </div>
            <div class="completed" id="rgb(255, 255, 0)">
                <button style="background-color: rgb(255, 255, 0);" onclick="play('rgb(255, 255, 0)')"></button>
            </div>
            <div class="completed" id="rgb(128, 0, 255)">
                <button style="background-color: rgb(128, 0, 255);" onclick="play('rgb(128, 0, 255)')"></button>
            </div>
            <div class="completed" id="rgb(0, 255, 0)">
                <button style="background-color: rgb(0, 255, 0);" onclick="play('rgb(0, 255, 0)')"></button>
            </div>
        </div>
        <script>
            document.querySelectorAll(".completed").forEach(box=>{
                var color = box.id;
                if(localStorage.getItem("completed_" + color) == "yes"){
                    box.style.backgroundColor = "lime";
                }
            });
            </script>
    </body>
</html>
