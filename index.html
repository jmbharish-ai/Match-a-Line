<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Home</title>
        <style>
            body{
                text-align: center;
            }
            #boxNumber{
                color: #b50707;
                font-size: 40px; font-family: 'Times New Roman';
            }
            #boxName{
                color: #b50707;
                font-size: 30px; font-family: 'Times New Roman';
            }
            #box{
                width: 400px; height: 400px;
                background-color: #049024; color: #6535e8;
                text-align: center; font-size: 150px; font-family: Georgia, 'Times New Roman', Times, serif;
                border: 2px solid black; border-radius: 0px;
            }
            .changeBox{
                width: 50px; height: 50px;
                background-color: #2393ee; color: #11cb52;
                text-align: center; font-size: 30px; font-family: Arial;
                border: 0px; border-radius: 0px;
            }
        </style>
    </head>
    <body onload="
        if(localStorage.getItem('you')===null)
            localStorage.setItem('you', '0');
        setBox(localStorage.getItem('you'));
    ">
        <h3 id="boxNumber"></h3>
        <h3 id="boxName"></h3>
        <button id="box" onclick="
            if(boxNumber<=Number(localStorage.getItem('you'))){
                location.href='stages.html';
                localStorage.setItem('box', String(boxNumber));
            }else if(boxNumber==Number(localStorage.getItem('you'))+1){
                if(localStorage.getItem('next box')=='next'){
                    localStorage.setItem('you', String(boxNumber));
                    setBox(boxNumber);
                    localStorage.removeItem('next box');
                }
            }
        "></button>
        <br>
        <button class="changeBox" onclick="changeBox('<')"><</button>
        <button class="changeBox" onclick="changeBox('>')">></button>
    </body>
    <script>
        var boxes=[
            "The World of Perfect Colors",
            "Placeholder",
            "Placeholder",
            "Placeholder",
            "Placeholder"
        ];
        var boxNumber=Number(localStorage.getItem("you"));
        function setBox(box){
            boxNumber=box;
            document.getElementById("boxNumber").innerHTML=box+1;
            document.getElementById("boxName").innerHTML=boxes[box];
            if(boxNumber<Number(localStorage.getItem("you"))){
                document.getElementById("box").innerHTML="";
            }else if(boxNumber==Number(localStorage.getItem("you"))){
                document.getElementById("box").innerHTML="You";
            }else if(boxNumber>Number(localStorage.getItem("you"))){
                document.getElementById("box").innerHTML="🔒";
            }
        }
        function changeBox(previousOrNext){
            if(previousOrNext=="<"){
                if(boxNumber>0)
                    setBox(boxNumber-1);
            }else if(previousOrNext==">"){
                if(boxNumber<boxes.length-1)
                    setBox(boxNumber+1);
            }
        }
    </script>
</html>
