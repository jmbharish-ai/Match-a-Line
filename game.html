<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Match a Line</title>
        <link rel="stylesheet" href="game.css">
        <script src="https://cdn.jsdelivr.net/npm/fraction.js"></script>
        <script src="game.js"></script>
    </head>
    <body onload="start()">
        <button id="stage"></button>
        <br><br>
        <button id="retry" onclick="location.href='game.html';">↻</button>
        <br><br>
        <button id="home" onclick="location.href='index.html';">🏠</button>
        <h2 id="turns">Turns: 25</h2>

        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="column" id="column1"></button>
            <button class="column" id="column2"></button>
            <button class="column" id="column3"></button>
            <button class="column" id="column4"></button>
            <button class="column" id="column5"></button>
        </div>
        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="row" id="row1"></button>
            <button class="square" id="1-1" onclick="replaceColor(1,1)"></button>
            <button class="square" id="1-2" onclick="replaceColor(1,2)"></button>
            <button class="square" id="1-3" onclick="replaceColor(1,3)"></button>
            <button class="square" id="1-4" onclick="replaceColor(1,4)"></button>
            <button class="square" id="1-5" onclick="replaceColor(1,5)"></button>
            <button class="row" id="row1opposite"></button>
        </div>
        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="row" id="row2"></button>
            <button class="square" id="2-1" onclick="replaceColor(2,1)"></button>
            <button class="square" id="2-2" onclick="replaceColor(2,2)"></button>
            <button class="square" id="2-3" onclick="replaceColor(2,3)"></button>
            <button class="square" id="2-4" onclick="replaceColor(2,4)"></button>
            <button class="square" id="2-5" onclick="replaceColor(2,5)"></button>
            <button class="row" id="row2opposite"></button>
        </div>
        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="row" id="row3"></button>
            <button class="square" id="3-1" onclick="replaceColor(3,1)"></button>
            <button class="square" id="3-2" onclick="replaceColor(3,2)"></button>
            <button class="square" id="3-3" onclick="replaceColor(3,3)"></button>
            <button class="square" id="3-4" onclick="replaceColor(3,4)"></button>
            <button class="square" id="3-5" onclick="replaceColor(3,5)"></button>
            <button class="row" id="row3opposite"></button>
        </div>
        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="row" id="row4"></button>
            <button class="square" id="4-1" onclick="replaceColor(4,1)"></button>
            <button class="square" id="4-2" onclick="replaceColor(4,2)"></button>
            <button class="square" id="4-3" onclick="replaceColor(4,3)"></button>
            <button class="square" id="4-4" onclick="replaceColor(4,4)"></button>
            <button class="square" id="4-5" onclick="replaceColor(4,5)"></button>
            <button class="row" id="row4opposite"></button>
        </div>
        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="row" id="row5"></button>
            <button class="square" id="5-1" onclick="replaceColor(5,1)"></button>
            <button class="square" id="5-2" onclick="replaceColor(5,2)"></button>
            <button class="square" id="5-3" onclick="replaceColor(5,3)"></button>
            <button class="square" id="5-4" onclick="replaceColor(5,4)"></button>
            <button class="square" id="5-5" onclick="replaceColor(5,5)"></button>
            <button class="row" id="row5opposite"></button>
        </div>
        <div style="display: flex; justify-content: center; gap: 2px; margin-bottom: 2px;">
            <button class="column" id="column1opposite"></button>
            <button class="column" id="column2opposite"></button>
            <button class="column" id="column3opposite"></button>
            <button class="column" id="column4opposite"></button>
            <button class="column" id="column5opposite"></button>
        </div>

        <button id="color"></button>
    </body>
</html>
