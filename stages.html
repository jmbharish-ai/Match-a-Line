<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Stages</title>
        <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>
        <style>
            body{
                text-align: center;
            }
            #home{
                width: 50px;
                height: 50px;
                background-color: green;
                font-size: 30px;
                border: 0px;
                border-radius: 0px;
            }
            button{
                width: 50px;
                height: 50px;
                border: 2px solid black;
                border-radius: 25px;
            }
            .completed{
                width: 70px;
                height: 70px;
                background-color: rgb(249, 41, 4);
                border-radius: 0px;
                display:flex;
                justify-content:center;
                align-items:center;
            }
        </style>
    </head>
    <body>
        <h1>Choose a Stage</h1>
        <button id="home" onclick="location.href='index.html';">🏠</button>
        <br><br>
        <div id="stages" style="
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 2px;
        align-items: center;
        "></div>
        <script>
            var perfectColors=[
                color("1", "B", "1", "R", "1"),
                color("1", "B", "1", "G", "1"),
                color("1", "", "0", "", "0"),
                color("1", "", "0", "R", "1"),
                color("0", "", "0", "", "0"),
                color("1", "B", "1", "", "0"),
                color("1/2", "Y", "1", "R", "1"),
                color("1/2", "", "0", "", "0"),
                color("1", "Y", "1", "R", "1"),
                color("1", "Y", "1", "", "0"),
                color("1", "B", "1", "R", "1/2"),
                color("1", "", "0", "G", "1")
            ];
            for(let i=0; i<perfectColors.length; i++){
                var completed=document.createElement("div");
                document.getElementById("stages").appendChild(completed);
                completed.className="completed";
                completed.id=perfectColors[i];

                var stage=document.createElement("button");
                completed.appendChild(stage);
                stage.style.backgroundColor=perfectColors[i];
                stage.addEventListener("click", ()=>{
                    localStorage.setItem("stage", perfectColors[i]);
                    location.href="game.html";
                });
            }
            document.querySelectorAll(".completed").forEach(box=>{
                var color=box.id;
                if(localStorage.getItem(localStorage.getItem("box")+"completed_"+color)=="yes"){
                    box.style.backgroundColor="#17d421";
                }
            });
            var next=true;
            for(var i=0; i<perfectColors.length; i++){
                if(localStorage.getItem(localStorage.getItem("box")+"completed_"+perfectColors[i])!="yes")
                    next=false;
            }
            if(next) localStorage.setItem("next box", "next");
            localStorage.removeItem("stage");
            function color(L, YB, YBV, RG, RGV){
                L=Fraction(L); YBV=Fraction(YBV); RGV=Fraction(RGV);
                var R=0; var G=0; var B=0;
                if(YB=="Y"&&RG=="R"){
                    R=Fraction("1");
                    if(greaterEqual(YBV, RGV)) G=(Fraction("1")).sub(RGV.div(Fraction("2"))); else G=((Fraction("1")).sub(RGV)).add(YBV.div(Fraction("2")));
                    B=(Fraction("1")).sub(max());
                }else if(YB=="Y"&&RG==""){
                    R=Fraction("1");
                    G=Fraction("1");
                    B=(Fraction("1")).sub(YBV);
                }else if(YB=="Y"&&RG=="G"){
                    if(greaterEqual(YBV, RGV)) R=(Fraction("1")).sub(RGV.div(Fraction("2"))); else R=((Fraction("1")).sub(RGV)).add(YBV.div(Fraction("2")));
                    G=Fraction("1");
                    B=(Fraction("1")).sub(max());
                }else if(YB==""&&RG=="R"){
                    R=Fraction("1");
                    G=(Fraction("1")).sub(RGV);
                    B=(Fraction("1")).sub(RGV);
                }else if(YB==""&&RG==""){
                    R=Fraction("1");
                    G=Fraction("1");
                    B=Fraction("1");
                }else if(YB==""&&RG=="G"){
                    R=(Fraction("1")).sub(RGV);
                    G=Fraction("1");
                    B=(Fraction("1")).sub(RGV);
                }else if(YB=="B"&&RG=="R"){
                    if(greaterEqual(RGV, YBV)){R=Fraction("1"); B=((Fraction("1")).sub(RGV)).add(YBV);}
                    else{R=((Fraction("1")).sub(YBV)).add(RGV); B=Fraction("1");}
                    G=(Fraction("1")).sub(max());
                }else if(YB=="B"&&RG==""){
                    R=(Fraction("1")).sub(YBV);
                    G=(Fraction("1")).sub(YBV);
                    B=Fraction("1");
                }else if(YB=="B"&&RG=="G"){
                    if(greaterEqual(RGV, YBV)){G=Fraction("1"); B=((Fraction("1")).sub(RGV)).add(YBV);}
                    else{G=((Fraction("1")).sub(YBV)).add(RGV); B=Fraction("1");}
                    R=(Fraction("1")).sub(max());
                }
                R=L.mul(R); G=L.mul(G); B=L.mul(B);

                R=(R.mul(Fraction("255"))).round().valueOf(); G=(G.mul(Fraction("255"))).round().valueOf(); B=(B.mul(Fraction("255"))).round().valueOf();
                return "rgb("+R+", "+G+", "+B+")";
                function max(){if(greaterEqual(YBV, RGV)) return YBV; else return RGV;}
                function greaterEqual(first, next){if(first.compare(next)>=0) return true; else return false;} //greater than or equal to
            }
        </script>
    </body>
</html>
